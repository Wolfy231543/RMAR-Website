<!DOCTYPE html>
<html>
<head>
        <title>Example page</title>
        <link rel="stylesheet" href="styles_wolfy.css">
</head>
<body>

<!-- This is the banner. It's normally used at the top of the page but that's not required. -->

    <div class="banner">
        <img src="lil_fucker.png" alt="A light blue planet with neon magenta rings and swirly "RMAR" text." class="logo" style="margin-left: 0px; margin-right: auto;">
        <a href="example_hub.html" class="button">Style Hub</a>
    </div>
    <br>

<!-- This showcases both the custom font sizes named after their purpose instead of just <h1> or <p>. It is housed inside a "popup" which is used for things like articles. -->

    <div class="popup" style="width: 30%;">
        <p class="header">Header</p>
        <p class="title">Title</p>
        <p class="sub-title">Sub Title</p>
        <p>Paragraph</p>
        <p class="note">Note</p>
    </div>
    <br>

<!-- This is just the explanation for this page. Try to keep this at the bottom above the footer. -->

    <div class="popup" style="width: 40%;">
        <p class="title">Explanation:</p>
        <p>This page is to test the .CSS style-file for this site. Most people won't see this so hello me :3</p>
    </div>

<!-- This is the footer. It shows the credits, copyright, and anything like that. -->

    <br>
    <div class="footer">
        <p>Footer text</p>
        <p class="note">Footer note<p>
    <div>
</body>
</html>
